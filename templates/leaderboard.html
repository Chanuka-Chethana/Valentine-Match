<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Share Section Styles */
        .share-container {
            background: #fff0f5;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px dashed #ff3366;
        }
        
        .share-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        
        .share-btn:active { transform: scale(0.95); }
        
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-copy { background-color: #333; color: white; }
        .btn-native { background-color: #ff3366; color: white; }
        
        /* Chat Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;}
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; position: relative; }
        .chat-box { height: 300px; overflow-y: auto; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-radius: 5px; }
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 15px; width: fit-content; max-width: 80%; word-wrap: break-word; }
        .me { background: #ff3366; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .them { background: #e0e0e0; color: black; margin-right: auto; border-bottom-left-radius: 2px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <ul class="circles">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>


    <div class="container">
        
        <div class="share-container">
            <h3 style="margin-top:0;">🚀 Share Quiz</h3>
            
            <button class="share-btn btn-whatsapp" onclick="shareToWhatsApp()">
                <i class="fab fa-whatsapp"></i> Share on WhatsApp
            </button>

            <button class="share-btn btn-native" onclick="nativeShare()">
                <i class="fas fa-share-alt"></i> Share via...
            </button>

            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" value="{{ share_link }}" id="myLink" readonly style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button class="share-btn btn-copy" onclick="copyLink()" style="width: auto; margin: 0;">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </div>
        
        <h3>❤️ Matches & Chats</h3>
        
        {% if not players %}
            <p style="color: gray; font-style: italic;">තාම කවුරුත් නෑ... Link එක Share කරන්න! ☝️</p>
        {% else %}
            <table>
                <tr><th>Name</th><th>Score</th><th>Action</th></tr>
                {% for p in players %}
                <tr>
                    <td>{{ p.name }}</td>
                    <td>{{ p.score }}/10</td>
                    <td>
                        <button onclick="openChat('{{ p.room_id }}', '{{ p.name }}')" 
                                style="padding:5px 10px; background:#ff3366; color:white; border:none; border-radius:5px; cursor:pointer;">
                            Chat 💬
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </table>
        {% endif %}
    </div>

    <div id="chatModal" class="modal">
        <div class="modal-content">
            <span onclick="closeChat()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:20px;">&times;</span>
            <h3 id="chatTitle">Chat</h3>
            
            <div id="chatWindow" class="chat-box"></div>
            
            <div style="display:flex; gap:10px; align-items: center;">
                <input type="text" id="adminMsg" placeholder="Type here..." 
                       style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px; margin:0; width:auto;">
                
                <button onclick="sendAdminMsg()" 
                        style="padding:10px 20px; background:#ff3366; color:white; border:none; border-radius:5px; width: auto; margin:0; cursor:pointer;">
                    Send
                </button>
            </div>
            </div>
    </div>

    <script>
        const shareLink = "{{ share_link }}";
        const creatorName = "{{ creator }}";
        let currentRoom = "";
        let intervalId = null;

        // --- Share Functions (පරණ විදියටම තියන්න) ---
        function shareToWhatsApp() {
            const text = `Do you know ${creatorName}? ❤️\nTry this Quiz: ${shareLink}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
        function copyLink() {
            navigator.clipboard.writeText(shareLink);
            alert("Link Copied!");
        }
        async function nativeShare() {
            if (navigator.share) await navigator.share({title: 'Quiz', url: shareLink});
        }

        // --- CHAT FUNCTIONS (UPDATED) ---

        function openChat(roomId, playerName) {
            document.getElementById("chatModal").style.display = "block";
            document.getElementById("chatTitle").innerText = "Chat with " + playerName;
            currentRoom = roomId;
            
            loadMessages(); // මුලින්ම ලෝඩ් කරන්න
            
            // පරණ interval එකක් තියෙනවා නම් අයින් කරන්න
            if (intervalId) clearInterval(intervalId);
            
            // අලුත් interval එක පටන් ගන්න (තත්පර 3න් 3ට)
            intervalId = setInterval(loadMessages, 3000);
        }

        function closeChat() {
            document.getElementById("chatModal").style.display = "none";
            // Chat එක වැහුවම අනවශ්‍ය විදියට refresh වෙන එක නවත්තන්න
            if (intervalId) clearInterval(intervalId);
        }

        function loadMessages() {
            if (!currentRoom) return;
            
            // Cache ප්‍රශ්නය විසඳන්න Timestamp එකක්
            const timestamp = new Date().getTime();

            fetch(`/get_chat/${currentRoom}?t=${timestamp}`)
                .then(res => res.json())
                .then(data => {
                    const box = document.getElementById("chatWindow");
                    
                    // අලුත් මැසේජ් තියෙනවා නම් විතරක් update කරන්න
                    if (box.childElementCount !== data.length) {
                        box.innerHTML = "";
                        data.forEach(m => {
                            const div = document.createElement("div");
                            div.className = "msg " + (m.sender === creatorName ? "me" : "them");
                            div.innerHTML = `<b>${m.sender}:</b> ${m.msg}`;
                            box.appendChild(div);
                        });
                        box.scrollTop = box.scrollHeight;
                    }
                });
        }

        function sendAdminMsg() {
            const txt = document.getElementById("adminMsg").value;
            if(!txt) return;
            
            const fd = new FormData();
            fd.append("room_id", currentRoom);
            fd.append("sender", creatorName);
            fd.append("msg", txt);
            
            fetch("/send_chat", { method: "POST", body: fd })
                .then(() => {
                    document.getElementById("adminMsg").value = "";
                    loadMessages();
                });
        }
    </script>
</body>
</html>
